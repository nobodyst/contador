<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador de Tiempo</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #111;
            color: #fff;
        }
        .contador-contenedor {
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 10px;
            color: #888;
        }
        #tiempo {
            font-size: 5rem;
            font-weight: bold;
            font-family: monospace;
            background: #222;
            padding: 10px 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(255,255,255,0.1);
        }
    </style>
</head>
<body>

    <div class="contador-contenedor">
        <h1>Tiempo Transcurrido</h1>
        <div id="tiempo">130:10:00</div>
    </div>

    <script>
        // VALORES ACTUALIZADOS AQUÍ:
        let horas = 130;
        let minutes = 10;
        let segundos = 0;

        function actualizarContador() {
            segundos++; 

            if (segundos >= 60) {
                segundos = 0;
                minutes++;
            }
            if (minutes >= 60) {
                minutes = 0;
                horas++;
            }

            let hrsFormateadas = horas.toString().padStart(2, '0');
            let minsFormateados = minutes.toString().padStart(2, '0');
            let segsFormateados = segundos.toString().padStart(2, '0');

            document.getElementById("tiempo").innerText = `${hrsFormateadas}:${minsFormateados}:${segsFormateados}`;
        }

        setInterval(actualizarContador, 1000);
    </script>

</body>
</html>
