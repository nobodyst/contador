<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador Retro</title>
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #000;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
    }

    #contador {
      font-family: 'Press Start 2P', monospace;
      font-size: clamp(2rem, 8vw, 5rem);
      color: #ffffff;
      text-shadow:
        -3px -3px 0 #000,  3px -3px 0 #000,
        -3px  3px 0 #000,  3px  3px 0 #000,
        -3px  0   0 #000,  3px  0   0 #000,
         0   -3px 0 #000,  0    3px 0 #000;
      letter-spacing: 0.05em;
    }

    @keyframes hora {
      0%   { transform: scale(1);    color: #ffffff; }
      15%  { transform: scale(1.18); color: #ffe066;
             text-shadow:
               -3px -3px 0 #000,  3px -3px 0 #000,
               -3px  3px 0 #000,  3px  3px 0 #000,
               -3px  0   0 #000,  3px  0   0 #000,
                0   -3px 0 #000,  0    3px 0 #000; }
      30%  { transform: scale(1);    color: #ffffff; }
      45%  { transform: scale(1.10); color: #ffe066; }
      60%  { transform: scale(1);    color: #ffffff;
             text-shadow:
               -3px -3px 0 #000,  3px -3px 0 #000,
               -3px  3px 0 #000,  3px  3px 0 #000,
               -3px  0   0 #000,  3px  0   0 #000,
                0   -3px 0 #000,  0    3px 0 #000; }
    }

    .celebrar {
      animation: hora 1.4s ease-in-out;
    }
  </style>
</head>
<body>
  <div id="contador">00:00:00</div>

  <script>
    let totalSegundos = 0;
    const el = document.getElementById('contador');

    function formatear(n) {
      return String(n).padStart(2, '0');
    }

    function actualizar() {
      totalSegundos++;
      const horas    = Math.floor(totalSegundos / 3600);
      const minutos  = Math.floor((totalSegundos % 3600) / 60);
      const segundos = totalSegundos % 60;

      el.textContent = formatear(horas) + ':' + formatear(minutos) + ':' + formatear(segundos);

      if (totalSegundos % 3600 === 0) {
        el.classList.remove('celebrar');
        void el.offsetWidth;
        el.classList.add('celebrar');
        el.addEventListener('animationend', () => el.classList.remove('celebrar'), { once: true });
      }
    }

    setInterval(actualizar, 1000);
  </script>
</body>
</html>
