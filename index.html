<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contador Minimalista Retro</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
    
    <style>
        /* ESTILOS DE LA PÁGINA (FONDO BLANCO Y CENTRADO) */
        body {
            margin: 0;
            padding: 0;
            background-color: #ffffff; /* Fondo blanco */
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
            font-family: 'Press Start 2P', cursive;
        }

        /* ESTILO DE LOS NÚMEROS (COLOR NEGRO) */
        .tiempo {
            font-size: 48px; /* Tamaño grande y claro */
            color: #000000; /* Números negros */
            letter-spacing: 2px;
            user-select: none; /* Evita que se seleccione el texto por error */
        }
    </style>
</head>
<body>

    <div class="tiempo" id="display-tiempo">00:00:00</div>

    <script>
        // Forzamos limpiar cualquier rastro del antiguo contador de 130 horas
        localStorage.removeItem('contador_puro_segundos');

        let totalSegundos = 0;
        const displayTiempo = document.getElementById('display-tiempo');

        // Función que transforma los segundos en formato HH:MM:SS
        function actualizarContador() {
            let horas = Math.floor(totalSegundos / 3600);
            let minutos = Math.floor((totalSegundos % 3600) / 60);
            let segundos = totalSegundos % 60;

            // Asegura que siempre se muestren 2 dígitos (ej: 05 en vez de 5)
            let hrsTexto = horas.toString().padStart(2, '0');
            let minTexto = minutos.toString().padStart(2, '0');
            let segTexto = segundos.toString().padStart(2, '0');

            displayTiempo.innerText = `${hrsTexto}:${minTexto}:${segTexto}`;
        }

        // Función que suma un segundo e incrementa sin parar
        function incrementar() {
            totalSegundos++;
            actualizarContador();
            localStorage.setItem('contador_puro_segundos', totalSegundos);
        }

        // Recupera el tiempo si se recarga la página para que no pierda el progreso, o inicia en 0
        const tiempoGuardado = localStorage.getItem('contador_puro_segundos');
        if (tiempoGuardado !== null) {
            totalSegundos = parseInt(tiempoGuardado, 10);
        } else {
            totalSegundos = 0;
        }

        // Muestra el estado inicial
        actualizarContador();

        // Inicia el bucle infinito: suma 1 segundo cada 1000 milisegundos
        setInterval(incrementar, 1000);
    </script>
</body>
</html>
